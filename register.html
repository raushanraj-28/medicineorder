<!DOCTYPE html>
<html>
<head>
    <title>Register - MediQuick Pickup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-pills"></i> MediQuick Pickup</h1>
                <p>Create Your Account</p>
            </div>

            <div class="auth-body">
                <h2>Register New Account</h2>
                
                <div class="form-group">
                    <label for="regName"><i class="fas fa-user"></i> Full Name / Pharmacy Name:</label>
                    <input type="text" id="regName" placeholder="Enter your name or pharmacy name" class="form-control">
                </div>

                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> Email Address:</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" class="form-control">
                </div>

                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Password:</label>
                    <input type="password" id="regPassword" placeholder="Create a password (min. 6 characters)" class="form-control">
                </div>

                <div class="form-group">
                    <label for="regPhone"><i class="fas fa-phone"></i> Phone Number:</label>
                    <input type="tel" id="regPhone" placeholder="Enter phone number" class="form-control">
                </div>

                <div class="form-group">
                    <label for="regRole"><i class="fas fa-user-tag"></i> Register As:</label>
                    <select id="regRole" class="form-control">
                        <option value="user">👤 Customer (I want to order medicines)</option>
                        <option value="pharmacy">🏥 Pharmacy (I own/manage a pharmacy)</option>
                    </select>
                </div>

                <div id="pharmacyFields" style="display: none;">
                    <div class="form-group">
                        <label><i class="fas fa-map-marker-alt"></i> Pharmacy Address:</label>
                        <div class="address-input">
                            <div class="form-group">
                                <input type="text" id="regStreet" placeholder="Street Address" class="form-control">
                            </div>
                            <div class="form-group">
                                <input type="text" id="regCity" placeholder="City" class="form-control">
                            </div>
                            <div class="form-group full-width">
                                <input type="text" id="regFullAddress" placeholder="Full Address (for maps)" class="form-control">
                            </div>
                        </div>
                    </div>
                    
                    <div class="role-description">
                        <i class="fas fa-info-circle"></i>
                        <p>Your pharmacy address will be shown to customers when their order is ready for pickup.</p>
                    </div>
                </div>

                <div id="userFields">
                    
                </div>

                <button class="btn-primary btn-block" onclick="register()">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login Here</a></p>
                    
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('regRole').addEventListener('change', function() {
            const pharmacyFields = document.getElementById('pharmacyFields');
            const userFields = document.getElementById('userFields');
            
            if (this.value === 'pharmacy') {
                pharmacyFields.style.display = 'block';
                userFields.innerHTML = `
                    <div class="role-description">
                        <i class="fas fa-info-circle"></i>
                        <p>As a <strong>Pharmacy</strong>, you will receive customer orders and prepare them for pickup at your location.</p>
                    </div>
                `;
            } else {
                pharmacyFields.style.display = 'none';
                userFields.innerHTML = `
                    <div class="role-description">
                        <i class="fas fa-info-circle"></i>
                        <p>As a <strong>Customer</strong>, you can order medicines from multiple pharmacies and pick them up.</p>
                    </div>
                `;
            }
        });
    </script>
    
    <script src="script.js"></script>
</body>
</html>
