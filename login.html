<!DOCTYPE html>
<html>
<head>
    <title>Login - MediQuick Pickup</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-pills"></i> MediQuick Pickup</h1>
                <p>Medicine Order & Pickup System</p>
            </div>

            <div class="auth-body">
                <h2>Login to Your Account</h2>
                
                <div class="form-group">
                    <label for="loginEmail"><i class="fas fa-envelope"></i> Email Address:</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" class="form-control">
                </div>

                <div class="form-group">
                    <label for="loginPassword"><i class="fas fa-lock"></i> Password:</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" class="form-control">
                </div>

                <div class="form-group">
                    <label for="loginRole"><i class="fas fa-user-tag"></i> Login As:</label>
                    <select id="loginRole" class="form-control">
                        <option value="user">👤 Customer (Order Medicines)</option>
                        <option value="pharmacy">🏥 Pharmacy Staff (Prepare Orders)</option>
                    </select>
                </div>

                <button class="btn-primary btn-block" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="register.html">Register Here</a></p>
                    
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
